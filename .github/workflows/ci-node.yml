name: Common CI for Nodes
on:
  workflow_call:
    inputs:
      # Required parameters
      node-version:
        description: 'node version to use'
        required: true
        type: string
      extra-commands:
        description: 'Extra setup commands or checks to run before running tests'
        required: false
        type: string
      app-directory:
        description: 'Application subdirectory to run the tests in'
        required: false
        type: string
        default: '.'
      typecheck:
        description: 'Set to true to run type checking'
        required: false
        type: boolean
        default: false
      upload_artifacts:
        description: 'Set to true to upload build artifacts'
        required: false
        type: boolean
        default: false
      skip_sonar:
        description: 'Set to true to skip SonarQube checks'
        required: false
        type: boolean
        default: false
      skip-build:
        description: 'Set to true to skip the build phase'
        required: false
        type: boolean
        default: false
      working-directory:
        description: 'Working directory for the yarn installation, build and tests jobs.'
        required: false
        type: string
        default: '.'
      ignore-scripts:
        description: 'Set to true to skip lifecycle scripts during install (--ignore-scripts)'
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        description: 'SonarQube Cloud token'
        required: true
  workflow_dispatch:

jobs:
  commitlint:
    name: Check commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run commitlint
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6.2.1

  build:
    name: Lint and build
    if: ${{ !inputs.skip-build }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ inputs.node-version }} with dependency path
        if: ${{ inputs.working-directory != '.' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'yarn'
          cache-dependency-path: ${{ inputs.working-directory }}/package.json
      - name: Use Node.js ${{ inputs.node-version }} without dependency path
        if: ${{ inputs.working-directory == '.' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'yarn'
      - name: Check Yarn version and install dependencies
        run: |
          YARN_VERSION=$(yarn --version)
          MAJOR_VERSION=$(echo $YARN_VERSION | cut -d. -f1)
          if [ "$MAJOR_VERSION" -ge "4" ]; then
            echo "Using Yarn $YARN_VERSION - using modern flags"
            if [ "${{ inputs.ignore-scripts }}" = "true" ]; then
              yarn config set enableScripts false
            fi
            yarn install --immutable --inline-builds
          else
            echo "Using Yarn $YARN_VERSION - using legacy flags"
            IGNORE_SCRIPTS="${{ inputs.ignore-scripts == true && '--ignore-scripts' || '' }}"
            yarn install --frozen-lockfile --prefer-offline $IGNORE_SCRIPTS
          fi
      - name: Run extra commands
        if: ${{ inputs.extra-commands != ''}}
        run: ${{ inputs.extra-commands }}
      - name: Typecheck application
        if: ${{ inputs.typecheck }}
        working-directory: ${{ inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory }}
        run: yarn typecheck
      - name: Lint application
        working-directory: ${{ inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory }}
        run: yarn lint
      - name: Build application
        working-directory: ${{ inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory }}
        run: yarn build
      - name: Upload build
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ inputs.node-version }}
          path: |
            ${{ inputs.app-directory }}/dist
            ${{ inputs.app-directory }}/build
            ${{ inputs.app-directory }}/lib
          retention-days: 1
      - name: Check browser bundle size limits
        if: ${{ hashFiles(format('{0}/.size-limit.js', inputs.app-directory)) != '' }}
        working-directory: ${{ inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory }}
        run: yarn check-size
      - name: Check ecmascript checks for build files
        if: ${{ hashFiles(format('{0}/.escheckrc', inputs.app-directory)) != '' }}
        working-directory: ${{ inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory }}
        run: yarn check-dist

  tests:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ inputs.node-version }} with dependency path
      if: ${{ inputs.working-directory != '.' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'yarn'
        cache-dependency-path: ${{ inputs.working-directory }}/package.json
    - name: Use Node.js ${{ inputs.node-version }} without dependency path
      if: ${{ inputs.working-directory == '.' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'yarn'
    - name: Check Yarn version and install dependencies
      run: |
        YARN_VERSION=$(yarn --version)
        MAJOR_VERSION=$(echo $YARN_VERSION | cut -d. -f1)
        if [ "$MAJOR_VERSION" -ge "4" ]; then
          echo "Using Yarn $YARN_VERSION - using modern flags"
          if [ "${{ inputs.ignore-scripts }}" = "true" ]; then
            yarn config set enableScripts false
          fi
          yarn install --immutable --inline-builds
        else
          echo "Using Yarn $YARN_VERSION - using legacy flags"
          IGNORE_SCRIPTS="${{ inputs.ignore-scripts == true && '--ignore-scripts' || '' }}"
          yarn install --frozen-lockfile --prefer-offline $IGNORE_SCRIPTS
        fi
    - name: Run extra commands
      if: ${{ inputs.extra-commands != ''}}
      run: ${{ inputs.extra-commands }}
    - name: Run tests
      working-directory: ${{ inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory }}
      run: yarn test:coverage
      env:
        CI: true
    # Coverage path logic (keep in sync with sonarcloud job's cache/restore step):
    # Resolves the effective directory (app-directory if set, else working-directory),
    # then prefixes 'coverage' with '<dir>/' when running in a subdirectory.
    - name: Store coverage report
      uses: actions/cache/save@9255dc7a253b0ccc959486e2bca901246202afeb  # v5.0.1
      with:
        path: ${{ (inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory) && format('{0}/', inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory) || ''}}coverage
        key: cache-${{ github.run_id }}-${{ github.run_attempt }}

  sonarcloud:
    name: Run SonarQube Cloud Scan
    if: ${{ !inputs.skip_sonar }}
    runs-on: ubuntu-latest
    needs: tests
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    # Coverage path logic (keep in sync with tests job's cache/save step):
    # Resolves the effective directory (app-directory if set, else working-directory),
    # then prefixes 'coverage' with '<dir>/' when running in a subdirectory.
    - name: Restore coverage report
      uses: actions/cache/restore@9255dc7a253b0ccc959486e2bca901246202afeb  # v5.0.1
      with:
        path: ${{ (inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory) && format('{0}/', inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory) || ''}}coverage
        key: cache-${{ github.run_id }}-${{ github.run_attempt }}
        fail-on-cache-miss: true
    # Without this workaround, SonarQube Cloud reports a warning about an incorrect source path
    - name: Override coverage report source path for SonarQube Cloud
      working-directory: ${{ inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory }}
      run: |
        find coverage -type f \( -name '*.info' -o -name 'lcov.info' \) 2>/dev/null | xargs -r sed -i 's@SF:'$GITHUB_WORKSPACE'@SF:/github/workspace/@g' || true
        find coverage -type f -name '*.json' 2>/dev/null | xargs -r sed -i 's@'$GITHUB_WORKSPACE'@/github/workspace/@g' || true
    - name: SonarQube Cloud Scan
      uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
      with:
        projectBaseDir: ${{ inputs.app-directory == '.' && inputs.working-directory || inputs.app-directory }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        
