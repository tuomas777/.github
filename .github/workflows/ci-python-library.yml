name: Common CI for Python libraries

on:
  workflow_call:
    inputs:
      python-matrix:
          description: "Python versions to use in the test matrix. This needs to be an array inside of a string, e.g. \"['3.10', '3.11']\", due to GHA not supporting array inputs."
          required: true
          type: string
      python-version:
          description: "Python version to use for pre-commit checks."
          required: false
          type: string
          default: "3.x"
      enable-sonar:
          description: "Whether to run the SonarQube Cloud Scan job after tests or not. Enabled by default."
          required: false
          type: boolean
          default: true
      commitlint-config-file:
          description: 'Path to commitlint config file. If empty, commitlint uses its default config discovery.'
          required: false
          type: string
          default: ''
      pre-commit-config-file:
          description: 'Path to .pre-commit-config.yaml. If empty, pre-commit uses default discovery.'
          required: false
          type: string
          default: ''
    secrets:
      sonar-token:
        description: "Token for SonarQube Cloud Scan. Required if enable-sonar is set to true."
        required: false
      github-token:
        description: "GITHUB_TOKEN. Required if enable-sonar is set to true."
        required: false

jobs:
  commitlint:
    name: Check commit messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: ${{ inputs.commitlint-config-file }}

  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Python ${{ inputs.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run pre-commit
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      with:
        extra_args: ${{ inputs['pre-commit-config-file'] != '' && format('--config {0}', inputs['pre-commit-config-file']) || '' }}

  tests:
    name: Python ${{ matrix.python_version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version: ${{ fromJSON(inputs.python-matrix) }}

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python ${{ matrix.python_version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python_version }}

    - name: Set up pip cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      env:
        cache-name: cache-pip-modules
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

    - name: Install hatch
      run: python -m pip install hatch

    - name: Run tests
      run: hatch test -c -i py=${{ matrix.python_version }}

    - name: Generate coverage report
      run: hatch run coverage xml -o coverage-${{ matrix.python_version }}.xml

    - name: Upload coverage report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-${{ matrix.python_version }}
        path: coverage-${{ matrix.python_version }}.xml

  sonarcloud:
    name: Run SonarQube Cloud Scan
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ inputs.enable-sonar }}

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        # Required by SonarQube Cloud
        fetch-depth: 0

    - name: Download coverage reports
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        merge-multiple: true
        path: .coverage-reports

    - name: SonarQube Cloud Scan
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
      env:
        GITHUB_TOKEN: ${{ secrets.github-token }}
        SONAR_TOKEN: ${{ secrets.sonar-token }}
